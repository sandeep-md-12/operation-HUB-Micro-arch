server {
    listen 80;

    # ─── Increase max upload size for file endpoints ───
    client_max_body_size 20M;

    # ─── Forward all requests to the FastAPI container ───
    location / {
        proxy_pass         http://web:8000;

        # Required headers so FastAPI receives correct client info
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Required for WebSocket support (used by FastAPI's websocket routes)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        # Prevent timeout on long-running requests (e.g. file exports)
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ─── Health check endpoint passthrough ───
    location /health {
        proxy_pass http://web:8000/health;
        access_log off;
    }
}
