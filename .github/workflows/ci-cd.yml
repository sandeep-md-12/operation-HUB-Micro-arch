name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  ci:
    name: Continuous Integration (Test)
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest
        env:
          # All values pulled from GitHub Secrets — nothing hardcoded here
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ALGORITHM: ${{ secrets.ALGORITHM }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          DYNAMODB_TABLE_NAME: ${{ secrets.DYNAMODB_TABLE_NAME }}
          CELERY_BROKER_URL: redis://localhost:6379/1
          CELERY_RESULT_BACKEND: redis://localhost:6379/2
          REDIS_URL: redis://localhost:6379/0
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          INTERNAL_SERVICE_TOKEN: ${{ secrets.INTERNAL_SERVICE_TOKEN }}
          SQL_ECHO: "false"
        run: |
          python -m pytest

  cd:
    name: Continuous Deployment (EC2)
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Provision EC2 & Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |

            # ─────────────────────────────────────────────
            # STEP 1: Install Docker (if not already installed)
            # ─────────────────────────────────────────────
            if ! command -v docker &> /dev/null; then
              echo ">>> Docker not found. Installing Docker..."
              sudo apt-get update -y
              sudo apt-get install -y ca-certificates curl gnupg lsb-release
              sudo install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              sudo chmod a+r /etc/apt/keyrings/docker.gpg
              echo \
                "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
                https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | \
                sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
              sudo apt-get update -y
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
              sudo systemctl enable docker
              sudo systemctl start docker
              # Allow current user to run docker without sudo
              sudo usermod -aG docker $USER
              echo ">>> Docker installed successfully."
            else
              echo ">>> Docker already installed. Skipping."
            fi

            # ─────────────────────────────────────────────
            # STEP 2: Install Git (if not already installed)
            # ─────────────────────────────────────────────
            if ! command -v git &> /dev/null; then
              echo ">>> Git not found. Installing Git..."
              sudo apt-get install -y git
              echo ">>> Git installed successfully."
            else
              echo ">>> Git already installed. Skipping."
            fi

            # ─────────────────────────────────────────────
            # STEP 3: Clone repo on first deploy, pull on subsequent deploys
            # ─────────────────────────────────────────────
            APP_DIR="/home/$USER/operations-hub"

            if [ ! -d "$APP_DIR/.git" ]; then
              echo ">>> Repo not found. Cloning for the first time..."
              git clone ${{ secrets.GITHUB_REPO_URL }} "$APP_DIR"
            else
              echo ">>> Repo found. Pulling latest changes..."
              cd "$APP_DIR"
              git pull origin main
            fi

            cd "$APP_DIR"

            # ─────────────────────────────────────────────
            # STEP 4: Write .env file from GitHub Secrets
            # (Overwrites on every deploy to keep it in sync)
            # ─────────────────────────────────────────────
            echo ">>> Writing .env file from GitHub Secrets..."
            cat > .env <<EOF
            DATABASE_URL=postgresql+asyncpg://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@db:5432/${{ secrets.POSTGRES_DB }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            ALGORITHM=${{ secrets.ALGORITHM }}
            REDIS_URL=redis://redis:6379/0
            CELERY_BROKER_URL=redis://redis:6379/1
            CELERY_RESULT_BACKEND=redis://redis:6379/2
            AWS_REGION=${{ secrets.AWS_REGION }}
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            S3_BUCKET_NAME=${{ secrets.S3_BUCKET_NAME }}
            DYNAMODB_TABLE_NAME=${{ secrets.DYNAMODB_TABLE_NAME }}
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_PORT=${{ secrets.SMTP_PORT }}
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
            APP_BASE_URL=${{ secrets.APP_BASE_URL }}
            INTERNAL_SERVICE_TOKEN=${{ secrets.INTERNAL_SERVICE_TOKEN }}
            SQL_ECHO=false
            EOF
            echo ">>> .env file written successfully."

            # ─────────────────────────────────────────────
            # STEP 5: Build and start all Docker services
            # ─────────────────────────────────────────────
            echo ">>> Starting Docker services..."
            sudo docker compose up -d --build

            # ─────────────────────────────────────────────
            # STEP 6: Clean up unused Docker images
            # ─────────────────────────────────────────────
            echo ">>> Cleaning up old Docker images..."
            sudo docker image prune -f

            echo ">>> Deployment complete!"

