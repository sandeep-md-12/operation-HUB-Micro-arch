# ─────────────────────────────────────────────────────────────────
# Production Override — uses pre-built image from Docker Hub
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# This overrides the 'build: .' directive in docker-compose.yml so
# the EC2 instance pulls the image instead of building it locally.
# The image is built and pushed by GitHub Actions on every merge to main.
# ─────────────────────────────────────────────────────────────────
version: '3.8'

services:
  web:
    build: !reset null
    image: mdsandeepkumar2004/operations-hub:${IMAGE_TAG:-latest}

  worker:
    build: !reset null
    image: mdsandeepkumar2004/operations-hub:${IMAGE_TAG:-latest}
